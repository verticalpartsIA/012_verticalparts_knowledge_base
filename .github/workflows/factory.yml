name: Factory MVP

on:
  pull_request:
    paths:
      - 'factory/**'
      - '.github/workflows/factory.yml'
  push:
    branches:
      - main
    paths:
      - 'factory/**'
      - '.github/workflows/factory.yml'

jobs:
  factory-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Py compile factory
        run: |
          python -m py_compile factory/scripts/*.py factory/tests/*.py

      - name: Install test dependency
        run: python -m pip install pytest pyyaml

      - name: Run factory tests
        run: python -m pytest factory/tests/

      - name: Validate factory config YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          for path in Path('factory/config').glob('*.yaml'):
              yaml.safe_load(path.read_text(encoding='utf-8'))
              print(f'OK {path}')
          PY
